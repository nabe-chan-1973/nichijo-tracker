<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>日々の実践</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6D28D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日々の実践">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --glass: rgba(255,255,255,0.12);
      --glass-border: rgba(255,255,255,0.25);
      --accent: #C4B5FD;
      --accent-bright: #A78BFA;
      --text: #F5F3FF;
      --text-dim: rgba(245,243,255,0.65);
      --purple-dark: #1E1B4B;
      --purple-mid: #312E81;
      --purple-main: #6D28D9;
      --purple-light: #7C3AED;
      --gold: #FCD34D;
    }

    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      color: var(--text);
      overscroll-behavior: none;
    }

    /* ── Background ── */
    #bg-container {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
    }
    #bg-image {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 1.2s ease;
    }
    #bg-image.show { opacity: 1; }
    #bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.28) 50%, rgba(0,0,0,0.5) 100%);
    }

    /* ── Page system ── */
    #page-main, #page-settings {
      position: fixed; inset: 0; z-index: 1;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* Settings page starts off-screen to the right */
    #page-settings {
      transform: translateX(100%);
    }

    /* When settings is open: main slides left, settings slides in */
    body.settings-open #page-main    { transform: translateX(-28%); }
    body.settings-open #page-settings { transform: translateX(0); }

    /* ── Inner layout ── */
    .page-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 14px;
      padding-top: max(env(safe-area-inset-top, 0px), 12px);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 32px);
    }

    /* ── Header (main) ── */
    .main-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 0 14px;
    }
    .main-header-center {
      flex: 1;
      text-align: center;
    }
    .main-header h1 {
      margin: 0 0 5px;
      font-size: 1.35rem; font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .day-count {
      font-size: 1rem; font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(196,181,253,0.5);
    }
    .date-display {
      font-size: 0.78rem; color: var(--text-dim); margin-top: 3px;
    }
    /* Settings icon button (top-right) */
    .settings-icon-btn {
      width: 42px; height: 42px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: var(--text-dim);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.12s, color 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .settings-icon-btn:active { transform: scale(0.9); }
    .settings-icon-btn:hover  { background: var(--glass); color: var(--text); }
    /* Spacer to balance the right button */
    .header-spacer { width: 42px; flex-shrink: 0; }

    /* ── Settings page header ── */
    .settings-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0 18px;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .settings-header h2 {
      margin: 0;
      font-size: 1.15rem; font-weight: 800;
      letter-spacing: 0.03em;
    }

    /* ── Cards ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      padding: 18px 18px 16px;
      margin-bottom: 13px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .card-icon { font-size: 1.7rem; line-height: 1; }
    .card-title { flex: 1; font-size: 0.98rem; font-weight: 700; letter-spacing: 0.02em; }
    .card-total { text-align: right; font-size: 0.72rem; color: var(--text-dim); line-height: 1.2; }
    .card-total-num { display: block; font-size: 1.4rem; font-weight: 800; color: var(--accent); line-height: 1; }

    /* ── Gratitude ── */
    .gratitude-body { text-align: center; }
    .count-main {
      font-size: 4.5rem; font-weight: 900; line-height: 1; color: #fff;
      text-shadow: 0 0 30px rgba(167,139,250,0.6), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.1s ease; user-select: none;
      display: inline-block; margin-bottom: 4px;
    }
    .count-main.bump { transform: scale(1.15); }
    .count-sub { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 12px; }
    .count-sub .pct { color: var(--accent-bright); font-weight: 700; }
    .progress-bar {
      width: 100%; height: 7px; background: rgba(255,255,255,0.15);
      border-radius: 4px; overflow: hidden; margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-light), var(--accent));
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-row {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;
    }
    .btn {
      padding: 13px 22px; border: none; border-radius: 50px;
      font-size: 0.93rem; font-weight: 700; cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
      outline: none; -webkit-font-smoothing: antialiased;
    }
    .btn:active { transform: scale(0.93); opacity: 0.9; }
    .btn-plus {
      background: linear-gradient(135deg, #6D28D9, #8B5CF6); color: white;
      flex: 1; max-width: 160px;
      box-shadow: 0 4px 16px rgba(109,40,217,0.4);
    }
    .btn-voice {
      background: linear-gradient(135deg, #047857, #059669); color: white;
      flex: 1; max-width: 240px;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      box-shadow: 0 4px 16px rgba(5,150,105,0.35);
    }
    .btn-voice.listening {
      background: linear-gradient(135deg, #B91C1C, #DC2626);
      animation: pulse-red 1.8s infinite;
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 4px 16px rgba(220,38,38,0.5); }
      50%      { box-shadow: 0 4px 28px rgba(220,38,38,0), 0 0 0 10px rgba(220,38,38,0.12); }
    }
    .voice-status { font-size: 0.73rem; color: var(--text-dim); min-height: 1.4em; transition: color 0.2s; }
    .voice-status.active { color: #6EE7B7; }
    .goal-row {
      display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px;
    }
    .goal-row label { font-size: 0.8rem; color: var(--text-dim); }
    input.goal-input {
      width: 72px; padding: 5px 8px;
      background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text); font-size: 0.95rem; font-weight: 600;
      text-align: center; outline: none; -webkit-appearance: none;
    }
    input.goal-input:focus { border-color: var(--accent-bright); background: rgba(255,255,255,0.18); }

    /* ── Check items ── */
    .check-item {
      display: flex; align-items: center; gap: 14px;
      padding: 11px 2px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: opacity 0.15s; user-select: none;
    }
    .check-item:last-child { border-bottom: none; padding-bottom: 0; }
    .check-item:first-child { padding-top: 0; }
    .check-item:active { opacity: 0.7; }
    .check-box {
      width: 28px; height: 28px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.35); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .check-box .check-mark {
      color: white; font-size: 0.9rem; font-weight: 800;
      opacity: 0; transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .check-item.checked .check-box {
      background: linear-gradient(135deg, var(--purple-light), var(--accent-bright));
      border-color: var(--accent-bright); transform: scale(1.05);
    }
    .check-item.checked .check-mark { opacity: 1; transform: scale(1); }
    .check-label { flex: 1; font-size: 0.95rem; font-weight: 500; }

    /* ── Background images ── */
    .bg-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
    }
    .bg-empty {
      grid-column: 1/-1; text-align: center; padding: 14px 0;
      font-size: 0.82rem; color: var(--text-dim);
    }
    .bg-thumb {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden;
      position: relative; cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .bg-thumb:active { transform: scale(0.95); }
    .bg-thumb.active { border-color: var(--accent); }
    .bg-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    .bg-del {
      position: absolute; top: 3px; right: 3px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      border: none; border-radius: 50%;
      color: #fff; font-size: 0.75rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .bg-upload-label {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 11px;
      background: rgba(255,255,255,0.08);
      border: 1.5px dashed rgba(255,255,255,0.3); border-radius: 13px;
      color: var(--text-dim); cursor: pointer; font-size: 0.88rem;
      transition: background 0.2s, color 0.2s; user-select: none;
    }
    .bg-upload-label:active { background: rgba(255,255,255,0.14); color: var(--text); }
    #file-input { display: none; }

    /* ── Settings rows ── */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 0.9rem; color: var(--text-dim); }
    .btn-sm {
      padding: 7px 15px; font-size: 0.8rem; font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.1); border-radius: 20px;
      color: var(--text); cursor: pointer;
      transition: background 0.15s, transform 0.12s;
    }
    .btn-sm:active { transform: scale(0.93); background: rgba(255,255,255,0.18); }
    .btn-sm.on { background: rgba(109,40,217,0.45); border-color: var(--accent-bright); color: var(--accent); }
    .btn-sm.danger { border-color: #FCA5A5; color: #FCA5A5; }

    /* ── Start date modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.hidden { display: none !important; }
    .modal {
      background: #1C1A3E;
      border: 1px solid rgba(196,181,253,0.25);
      border-radius: 26px; padding: 28px 24px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .modal p { margin: 0 0 20px; font-size: 0.84rem; color: var(--text-dim); line-height: 1.65; }
    .modal input[type="date"] {
      width: 100%; padding: 13px 14px;
      background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 13px; color: white; font-size: 1rem;
      margin-bottom: 16px; outline: none; -webkit-appearance: none; color-scheme: dark;
    }
    .modal input[type="date"]:focus { border-color: var(--accent-bright); }
    .btn-modal {
      display: block; width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
      border: none; border-radius: 14px; color: white;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 18px rgba(109,40,217,0.45);
      transition: transform 0.12s, opacity 0.12s;
    }
    .btn-modal:active { transform: scale(0.97); opacity: 0.9; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(80,40,200,0.9); backdrop-filter: blur(10px);
      color: white; padding: 10px 22px; border-radius: 50px;
      font-size: 0.88rem; font-weight: 600;
      z-index: 300; opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
      border: 1px solid rgba(196,181,253,0.35);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Celebration ── */
    .celebrate-overlay {
      position: fixed; inset: 0; z-index: 250; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .celebrate-text {
      font-size: 1.9rem; font-weight: 900; text-align: center;
      color: var(--gold); white-space: pre-line;
      text-shadow: 0 0 40px rgba(252,211,77,0.8), 0 2px 6px rgba(0,0,0,0.5);
      animation: celebrate 2.5s ease forwards; opacity: 0; line-height: 1.4;
    }
    @keyframes celebrate {
      0%   { opacity:0; transform: scale(0.6) translateY(30px); }
      20%  { opacity:1; transform: scale(1.1) translateY(0); }
      70%  { opacity:1; transform: scale(1) translateY(0); }
      100% { opacity:0; transform: scale(0.9) translateY(-30px); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Background -->
<div id="bg-container">
  <div id="bg-image"></div>
  <div id="bg-overlay"></div>
</div>

<!-- ═══════════ PAGE: MAIN ═══════════ -->
<div id="page-main">
<div class="page-inner">

  <div class="main-header">
    <div class="header-spacer"></div>
    <div class="main-header-center">
      <h1>🌟 日々の実践</h1>
      <div class="day-count" id="day-count">スタートから ── 日目</div>
      <div class="date-display" id="date-display"></div>
    </div>
    <button class="settings-icon-btn" onclick="openSettings()" aria-label="設定">⚙️</button>
  </div>

  <!-- 🙏 Gratitude Counter -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🙏</span>
      <span class="card-title">ありがとうカウンター</span>
      <div class="card-total">通算<span class="card-total-num" id="total-gratitude">0</span></div>
    </div>
    <div class="gratitude-body">
      <div class="count-main" id="daily-gratitude">0</div>
      <div class="count-sub">
        今日の目標: <span id="goal-display">100</span> 回
        <span class="pct" id="goal-pct"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-voice" id="voice-btn" onclick="toggleVoice()">🎤 音声認識 スタート</button>
      </div>
      <div class="voice-status" id="voice-status"></div>
      <div class="goal-row">
        <label for="goal-input">目標</label>
        <input type="number" id="goal-input" class="goal-input" value="100"
               min="1" max="9999" inputmode="numeric" onchange="updateGoal(this.value)">
        <label>回</label>
      </div>
    </div>
  </div>

  <!-- 🌊 Abundance Work -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🌊</span>
      <span class="card-title">豊かさワーク</span>
      <div class="card-total">通算<span class="card-total-num" id="total-abundance">0</span>日</div>
    </div>
    <div class="check-item" id="abundance-item" onclick="toggleCheck('abundance')">
      <div class="check-box"><span class="check-mark">✓</span></div>
      <div class="check-label">豊かさワークを行った</div>
    </div>
  </div>

  <!-- 🧘 Meditation -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🧘</span>
      <span class="card-title">瞑想</span>
      <div class="card-total">通算<span class="card-total-num" id="total-meditation">0</span>日</div>
    </div>
    <div class="check-item" id="meditation1-item" onclick="toggleCheck('meditation1')">
      <div class="check-box"><span class="check-mark">✓</span></div>
      <div class="check-label">朝の瞑想</div>
    </div>
    <div class="check-item" id="meditation2-item" onclick="toggleCheck('meditation2')">
      <div class="check-box"><span class="check-mark">✓</span></div>
      <div class="check-label">夜の瞑想</div>
    </div>
  </div>

  <!-- 📖 ACIM -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">📖</span>
      <span class="card-title">ACIM</span>
      <div class="card-total">通算<span class="card-total-num" id="total-acim">0</span>日</div>
    </div>
    <div class="check-item" id="acim-item" onclick="toggleCheck('acim')">
      <div class="check-box"><span class="check-mark">✓</span></div>
      <div class="check-label">ACIMを読んだ</div>
    </div>
  </div>

</div><!-- .page-inner -->
</div><!-- #page-main -->


<!-- ═══════════ PAGE: SETTINGS ═══════════ -->
<div id="page-settings">
<div class="page-inner">

  <div class="settings-header">
    <button class="back-btn" onclick="closeSettings()" aria-label="戻る">‹</button>
    <h2>⚙️ 設定</h2>
  </div>

  <!-- 🖼️ Background Images -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🖼️</span>
      <span class="card-title">背景画像</span>
    </div>
    <div class="bg-grid" id="bg-grid"></div>
    <label class="bg-upload-label" for="file-input" id="upload-label">
      ＋ 画像を追加（最大10枚）
    </label>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleImageUpload(event)">
    <div class="settings-row" style="margin-top:10px">
      <span class="settings-label">自動切替（30秒）</span>
      <button class="btn-sm" id="auto-rotate-btn" onclick="toggleAutoRotate()">OFF</button>
    </div>
  </div>

  <!-- ⚙️ App Settings -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">📅</span>
      <span class="card-title">アプリ設定</span>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">スタート日</div>
        <div id="start-date-display" style="font-size:0.82rem; color:var(--accent); margin-top:2px;">未設定</div>
      </div>
      <button class="btn-sm" onclick="openStartModal()">変更</button>
    </div>
    <div class="settings-row">
      <span class="settings-label">全データをリセット</span>
      <button class="btn-sm danger" onclick="resetAll()">リセット</button>
    </div>
  </div>

</div><!-- .page-inner -->
</div><!-- #page-settings -->


<!-- Start Date Modal -->
<div class="modal-overlay hidden" id="start-modal">
  <div class="modal">
    <h2>🌟 スタート日を設定</h2>
    <p>実践を始めた日を入力してください。<br>「スタートから△日目」の表示に使います。</p>
    <input type="date" id="start-date-input">
    <button class="btn-modal" onclick="saveStartDate()">設定する</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const SKEY = 'dailyPractice_v2';

const DEFAULTS = {
  startDate: null,
  dailyGoal: 100,
  lastDate: null,
  dailyGratitude: 0,
  dailyAbundance: false,
  dailyMeditation1: false,
  dailyMeditation2: false,
  dailyACIM: false,
  frozenGratitude: 0,
  frozenAbundance: 0,
  frozenMeditation: 0,
  frozenACIM: 0,
  bgImages: [],
  bgIndex: -1,
  autoRotate: false,
};

let S = { ...DEFAULTS };

function load() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) S = { ...DEFAULTS, ...JSON.parse(raw) };
  } catch(e) { console.warn(e); }
}

function save() {
  try {
    localStorage.setItem(SKEY, JSON.stringify(S));
  } catch(e) {
    if (e.name === 'QuotaExceededError')
      showToast('ストレージが満杯です。画像を削除してください。');
  }
}

// ════════════════════════════════════════
//  DATE
// ════════════════════════════════════════
function pad(n) { return String(n).padStart(2,'0'); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function checkReset() {
  const today = todayStr();
  if (S.lastDate && S.lastDate !== today) {
    S.frozenGratitude += S.dailyGratitude;
    if (S.dailyAbundance)                         S.frozenAbundance++;
    if (S.dailyMeditation1 || S.dailyMeditation2) S.frozenMeditation++;
    if (S.dailyACIM)                              S.frozenACIM++;
    S.dailyGratitude = 0;
    S.dailyAbundance = S.dailyMeditation1 = S.dailyMeditation2 = S.dailyACIM = false;
  }
  S.lastDate = today;
  save();
}

function daysSinceStart() {
  if (!S.startDate) return null;
  const s = new Date(S.startDate), t = new Date();
  s.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.floor((t - s) / 86400000) + 1;
}

// ════════════════════════════════════════
//  COMPUTED TOTALS
// ════════════════════════════════════════
const totalGratitude  = () => S.frozenGratitude  + S.dailyGratitude;
const totalAbundance  = () => S.frozenAbundance  + (S.dailyAbundance ? 1 : 0);
const totalMeditation = () => S.frozenMeditation + ((S.dailyMeditation1 || S.dailyMeditation2) ? 1 : 0);
const totalACIM       = () => S.frozenACIM       + (S.dailyACIM ? 1 : 0);

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render() {
  const days = daysSinceStart();
  document.getElementById('day-count').textContent =
    days !== null ? `スタートから ${days} 日目` : 'スタートから ── 日目';

  const now = new Date();
  const WD = ['日','月','火','水','木','金','土'];
  document.getElementById('date-display').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WD[now.getDay()]}）`;

  // Gratitude
  document.getElementById('daily-gratitude').textContent = S.dailyGratitude.toLocaleString();
  document.getElementById('total-gratitude').textContent = totalGratitude().toLocaleString();
  document.getElementById('goal-display').textContent    = S.dailyGoal;
  document.getElementById('goal-input').value            = S.dailyGoal;
  const pct = S.dailyGoal > 0 ? Math.min(100, Math.round(S.dailyGratitude / S.dailyGoal * 100)) : 0;
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('goal-pct').textContent        = pct > 0 ? ` (${pct}%)` : '';

  // Checks & totals
  setCheck('abundance-item',   S.dailyAbundance);
  setCheck('meditation1-item', S.dailyMeditation1);
  setCheck('meditation2-item', S.dailyMeditation2);
  setCheck('acim-item',        S.dailyACIM);
  document.getElementById('total-abundance').textContent  = totalAbundance();
  document.getElementById('total-meditation').textContent = totalMeditation();
  document.getElementById('total-acim').textContent       = totalACIM();

  // Settings page: start date display
  const sdEl = document.getElementById('start-date-display');
  if (S.startDate) {
    const d = new Date(S.startDate + 'T00:00:00');
    sdEl.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  } else {
    sdEl.textContent = '未設定';
  }

  // Background
  renderBgGrid();
  const arBtn = document.getElementById('auto-rotate-btn');
  arBtn.textContent = S.autoRotate ? 'ON' : 'OFF';
  arBtn.className   = 'btn-sm' + (S.autoRotate ? ' on' : '');
}

function setCheck(id, on) {
  document.getElementById(id).classList.toggle('checked', on);
}

// ════════════════════════════════════════
//  PAGE NAVIGATION
// ════════════════════════════════════════
function openSettings() {
  document.body.classList.add('settings-open');
  document.getElementById('page-settings').scrollTop = 0;
}

function closeSettings() {
  document.body.classList.remove('settings-open');
}

// ════════════════════════════════════════
//  GRATITUDE
// ════════════════════════════════════════
function addGratitude(n = 1) {
  const wasUnder = S.dailyGratitude < S.dailyGoal;
  S.dailyGratitude += n;
  save();

  const el = document.getElementById('daily-gratitude');
  el.textContent = S.dailyGratitude.toLocaleString();
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 150);

  const pct = Math.min(100, Math.round(S.dailyGratitude / S.dailyGoal * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('goal-pct').textContent = pct > 0 ? ` (${pct}%)` : '';
  document.getElementById('total-gratitude').textContent = totalGratitude().toLocaleString();

  if (navigator.vibrate) navigator.vibrate(25);
  if (wasUnder && S.dailyGratitude >= S.dailyGoal)
    showCelebration('🎉 目標達成！\nおめでとう！🎉');
}

function updateGoal(val) {
  const n = parseInt(val, 10);
  if (n > 0 && n <= 9999) { S.dailyGoal = n; save(); render(); }
}

// ════════════════════════════════════════
//  VOICE
// ════════════════════════════════════════
let recog = null, isListening = false;
let lastCountedText = '';
let lastCountedTime = 0;
const COUNT_COOLDOWN_MS = 1500; // 同じ認識を1.5秒以内に重複カウントしない

function initRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recog = new SR();
  recog.lang = 'ja-JP';
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 1;
  recog.onresult = (evt) => {
    for (let i = evt.resultIndex; i < evt.results.length; i++) {
      const r = evt.results[i];
      const text = r[0].transcript.trim();
      if (r.isFinal) {
        const confidence = r[0].confidence;
        // 感度調整：信頼度0.6未満は無視
        if (confidence > 0 && confidence < 0.6) {
          setVoiceStatus('🎤 聞いています…', true);
          continue;
        }
        // 「ありがとう」を含む場合のみカウント（完全な単語として）
        const cnt = (text.match(/ありがとう/g) || []).length;
        if (cnt > 0) {
          const now = Date.now();
          // 同じテキストが1.5秒以内に来た場合は重複とみなしスキップ
          const isDuplicate = text === lastCountedText && (now - lastCountedTime) < COUNT_COOLDOWN_MS;
          if (!isDuplicate) {
            addGratitude(cnt);
            setVoiceStatus(`「ありがとう」${cnt}回 認識`, true);
            lastCountedText = text;
            lastCountedTime = now;
          } else {
            setVoiceStatus('🎤 聞いています…', true);
          }
        } else {
          setVoiceStatus('🎤 聞いています…', true);
        }
      } else {
        if (text) setVoiceStatus('🎤 ' + text, true);
      }
    }
  };
  recog.onerror = (evt) => {
    if (evt.error === 'no-speech' || evt.error === 'aborted') return;
    setVoiceStatus('エラー: ' + evt.error);
    isListening = false; updateVoiceBtn();
  };
  recog.onend = () => {
    if (isListening) setTimeout(() => { if (isListening) try { recog.start(); } catch(e){} }, 400);
  };
  return true;
}

function toggleVoice() {
  if (!recog && !initRecog()) { showToast('音声認識は非対応のブラウザです'); return; }
  isListening = !isListening;
  updateVoiceBtn();
  if (isListening) {
    try { recog.start(); } catch(e){}
    setVoiceStatus('🎤 聞いています… 「ありがとう」と言ってください', true);
    if (navigator.vibrate) navigator.vibrate([30,50,30]);
  } else {
    try { recog.stop(); } catch(e){}
    setVoiceStatus('');
  }
}

function updateVoiceBtn() {
  const btn = document.getElementById('voice-btn');
  btn.textContent = isListening ? '⏹ 停止' : '🎤 音声認識 スタート';
  btn.classList.toggle('listening', isListening);
}

function setVoiceStatus(msg, active = false) {
  const el = document.getElementById('voice-status');
  el.textContent = msg;
  el.className = 'voice-status' + (active ? ' active' : '');
}

// ════════════════════════════════════════
//  CHECKBOXES
// ════════════════════════════════════════
function toggleCheck(key) {
  const K = 'daily' + key.charAt(0).toUpperCase() + key.slice(1);
  S[K] = !S[K];
  save();
  if (navigator.vibrate) navigator.vibrate(30);
  const labels = {
    abundance: '🌊 豊かさワーク 完了！',
    meditation1: '🧘 朝の瞑想 完了！',
    meditation2: '🧘 夜の瞑想 完了！',
    acim: '📖 ACIM 完了！',
  };
  if (S[K]) showToast(labels[key]);
  render();
}

// ════════════════════════════════════════
//  BACKGROUND IMAGES
// ════════════════════════════════════════
let autoRotateTimer = null;

function renderBgGrid() {
  const grid = document.getElementById('bg-grid');
  const upLabel = document.getElementById('upload-label');
  grid.innerHTML = '';
  upLabel.style.display = S.bgImages.length >= 10 ? 'none' : '';

  if (!S.bgImages.length) {
    grid.innerHTML = '<div class="bg-empty">画像が登録されていません</div>';
    return;
  }
  S.bgImages.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'bg-thumb' + (i === S.bgIndex ? ' active' : '');
    wrap.onclick = () => applyBg(i);
    const img = document.createElement('img');
    img.src = src; img.loading = 'lazy';
    const del = document.createElement('button');
    del.className = 'bg-del'; del.textContent = '✕';
    del.onclick = (e) => { e.stopPropagation(); deleteBg(i); };
    wrap.appendChild(img); wrap.appendChild(del);
    grid.appendChild(wrap);
  });
}

function applyBg(index) {
  S.bgIndex = index; save();
  const bgEl = document.getElementById('bg-image');
  bgEl.classList.remove('show');
  setTimeout(() => {
    if (index >= 0 && index < S.bgImages.length) {
      bgEl.style.backgroundImage = `url(${S.bgImages[index]})`;
      bgEl.classList.add('show');
    } else {
      bgEl.style.backgroundImage = '';
    }
  }, 400);
  renderBgGrid();
}

function deleteBg(i) {
  S.bgImages.splice(i, 1);
  if (S.bgIndex >= S.bgImages.length) S.bgIndex = S.bgImages.length - 1;
  if (S.bgIndex >= 0) { applyBg(S.bgIndex); }
  else {
    const bgEl = document.getElementById('bg-image');
    bgEl.classList.remove('show'); bgEl.style.backgroundImage = '';
    S.bgIndex = -1;
  }
  save(); renderBgGrid();
}

function handleImageUpload(evt) {
  const files = Array.from(evt.target.files);
  const slots = 10 - S.bgImages.length;
  if (!slots) { showToast('最大10枚まで登録できます'); return; }
  files.slice(0, slots).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => resizeImage(e.target.result, 1280, (url) => {
      S.bgImages.push(url);
      if (S.bgIndex < 0) applyBg(0);
      save(); renderBgGrid();
    });
    reader.readAsDataURL(file);
  });
  evt.target.value = '';
}

function resizeImage(src, maxPx, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxPx || h > maxPx) {
      if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else        { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = src;
}

function toggleAutoRotate() {
  S.autoRotate = !S.autoRotate; save(); render();
  S.autoRotate ? startAutoRotate() : stopAutoRotate();
}
function startAutoRotate() {
  stopAutoRotate();
  if (S.bgImages.length < 2) return;
  autoRotateTimer = setInterval(() => {
    if (S.bgImages.length) applyBg((S.bgIndex + 1) % S.bgImages.length);
  }, 30000);
}
function stopAutoRotate() {
  if (autoRotateTimer) { clearInterval(autoRotateTimer); autoRotateTimer = null; }
}

// ════════════════════════════════════════
//  START DATE MODAL
// ════════════════════════════════════════
function openStartModal() {
  document.getElementById('start-date-input').value = S.startDate || todayStr();
  document.getElementById('start-modal').classList.remove('hidden');
}
function saveStartDate() {
  const val = document.getElementById('start-date-input').value;
  if (!val) return;
  S.startDate = val; save();
  document.getElementById('start-modal').classList.add('hidden');
  render();
  showToast('スタート日を設定しました ✓');
}
document.getElementById('start-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
});

// ════════════════════════════════════════
//  RESET
// ════════════════════════════════════════
function resetAll() {
  if (!confirm('全データをリセットしますか？\nこの操作は取り消せません。')) return;
  stopAutoRotate();
  if (recog) { try { recog.stop(); } catch(e){} recog = null; }
  isListening = false;
  localStorage.removeItem(SKEY);
  S = { ...DEFAULTS };
  const bgEl = document.getElementById('bg-image');
  bgEl.classList.remove('show'); bgEl.style.backgroundImage = '';
  render(); showToast('データをリセットしました');
  setTimeout(() => openStartModal(), 600);
}

// ════════════════════════════════════════
//  TOAST / CELEBRATION
// ════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
function showCelebration(text) {
  if (navigator.vibrate) navigator.vibrate([80,60,80,60,200]);
  const ov = document.createElement('div'); ov.className = 'celebrate-overlay';
  const sp = document.createElement('div'); sp.className = 'celebrate-text';
  sp.textContent = text; ov.appendChild(sp); document.body.appendChild(ov);
  setTimeout(() => ov.remove(), 2600);
}

// ════════════════════════════════════════
//  MIDNIGHT SCHEDULER
// ════════════════════════════════════════
function scheduleMidnight() {
  const now = new Date(), next = new Date(now);
  next.setHours(24, 0, 1, 0);
  setTimeout(() => { checkReset(); render(); scheduleMidnight(); }, next - now);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
function init() {
  load();
  checkReset();

  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));

  if (!S.startDate) setTimeout(() => openStartModal(), 300);

  if (S.bgIndex >= 0 && S.bgImages.length > 0) {
    const bgEl = document.getElementById('bg-image');
    bgEl.style.backgroundImage = `url(${S.bgImages[S.bgIndex]})`;
    bgEl.classList.add('show');
  }

  if (S.autoRotate) startAutoRotate();
  scheduleMidnight();

  setInterval(() => {
    const now = new Date(), WD = ['日','月','火','水','木','金','土'];
    document.getElementById('date-display').textContent =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WD[now.getDay()]}）`;
  }, 60000);

  render();
}

init();
</script>
